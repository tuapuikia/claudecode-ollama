services:
  ollama:
    build: .
    image: tuapuikia/ollama:claude
    container_name: ollama
    working_dir: /workspace
    ports:
      - "11434:11434"
    volumes:
      - ./ollama_data:/root/.ollama
      - .:/workspace
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    environment:
      - OLLAMA_HOST=0.0.0.0
      - OLLAMA_KEEP_ALIVE=-1
    restart: unless-stopped

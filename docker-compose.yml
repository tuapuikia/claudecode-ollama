services:
  ollama:
    image: ${OLLAMA_IMAGE_TAG:-tuapuikia/ollama:claude}
    pull_policy: always
    container_name: ollama
    working_dir: /workspace
    ports:
      - "127.0.0.1:11434:11434"
    volumes:
      - ./ollama_data:/home/ubuntu/.ollama
      - ./.claude:/home/ubuntu/.claude
      - ${OLLAMA_DOCKER_MOUNT:-/var/run/docker.sock}:/var/run/docker.sock
      - ${OLLAMA_WORKSPACE:-.}:/workspace
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    environment:
      - OLLAMA_HOST=0.0.0.0
      - OLLAMA_KEEP_ALIVE=-1
    restart: unless-stopped
